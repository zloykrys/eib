apiVersion: v1
kind: Service
metadata:
  name: kubernetes-vip
  namespace: default
  labels:
    # Matches the EIB-generated MetalLB pool selector
    serviceType: kubernetes-vip
  annotations:
    # Key allows sharing IP with the Ingress service
    metallb.universe.tf/allow-shared-ip: "rke2-shared-vip"
spec:
  type: LoadBalancer
  loadBalancerIP: 172.16.33.10
  ports:
    - name: https
      port: 6443
      targetPort: 6443
    - name: supervisor
      port: 9345
      targetPort: 9345
  selector:
    component: kube-apiserver
