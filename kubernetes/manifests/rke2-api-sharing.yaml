apiVersion: v1
kind: ServiceAccount
metadata:
  name: vip-patch-sa
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vip-patch-role
rules:
- apiGroups: ["*"]
  resources: ["nodes", "services", "deployments"]
  verbs: ["get", "list", "patch", "update", "annotate", "watch"]
- apiGroups: ["metallb.io"]
  resources: ["ipaddresspools"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vip-patch-rolebinding
subjects:
- kind: ServiceAccount
  name: vip-patch-sa
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: vip-patch-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vip-sharing-patch
  namespace: kube-system
spec:
  template:
    spec:
      serviceAccountName: vip-patch-sa
      hostNetwork: true
      containers:
      - name: patcher
        image: docker.io/rancher/klipper-helm:v0.9.14-build20260210
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true # Ensures hostPath access isn't blocked
        volumeMounts:
        - name: host-bin
          mountPath: /host/bin
          readOnly: true
        command:
        - /bin/sh
        - -c
        - |
          set -e
          # Copy to a writable location to avoid 'Operation not permitted'
          cp /host/bin/kubectl /tmp/kubectl
          chmod +x /tmp/kubectl
          # Use the local copy for the rest of the script
          alias k='/tmp/kubectl'
          
          echo "Starting patch script..."
          until k get nodes; do echo "Waiting for API..."; sleep 5; done
          until k get svc kubernetes-vip -n default; do echo "waiting for vip..."; sleep 5; done
          until k get ipaddresspool api-ip -n metallb-system; do echo "waiting for pool..."; sleep 5; done
          
          echo "Applying MetalLB Pool Patch..."
          k patch ipaddresspool api-ip -n metallb-system --type='json' -p='[{"op": "replace", "path": "/spec/serviceAllocation/namespaces", "value":["default","kube-system"]}]'
          
          echo "Applying Sharing Annotations..."
          k annotate svc kubernetes-vip -n default metallb.io/allow-shared-ip=rke2-shared-vip --overwrite
          k annotate svc kubernetes-vip -n default metallb.universe.tf/allow-shared-ip=rke2-shared-vip --overwrite
          
          echo "Bouncing MetalLB Controller..."
          k rollout restart deployment metallb-controller -n metallb-system
          echo "VIP Shared successfully."
      restartPolicy: OnFailure
      volumes:
      - name: host-bin
        hostPath:
          path: /var/lib/rancher/rke2/bin
          type: Directory
  backoffLimit: 10
